name: CI Suite

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    - name: Run tests
      run: |
        uv sync
        uv run python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70
      env:
        DATABASE_PORT: 5432
        DATABASE_HOST: localhost
        DATABASE_PASSWORD: postgres
        DATABASE_USER: postgres
